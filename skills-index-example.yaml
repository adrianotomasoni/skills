          - "risk"
          - "financial"
          - "b2b"
          - "insurance"
          - "underwriting"
        
        models: ["claude-sonnet-4", "claude-opus-4"]
        minTokens: 1500
        
        dataRequirements:
          - "DF (Demonstração Financeira)"
          - "Serasa pontualidade"
          - "CNPJ / dados cadastrais"
          - "Grupo econômico"
          - "Setor / atividade"
          - "Histórico de pagamentos"
        
        outputFormats:
          - "Risk Letter (A-F)"
          - "JSON estruturado"
          - "Parecer executivo"
          - "Tabela de indicadores"
        
        examples:
          - "Validar crédito de vendedor brasileiro"
          - "Análise de Coface para importadora"
          - "Assessor de limite pra grupo exportador"
      
      
