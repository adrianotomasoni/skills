          Pergunta central: "Essa empresa vai me pagar no prazo?"
          Usa framework Coface + TradeRisk360 + Serasa.
        
        triggers:
          - "análise de crédito"
          - "limite de crédito"
          - "venda a prazo"
          - "balanço do cliente"
          - "balancete"
          - "DF consolidada"
          - "grupo econômico"
          - "Serasa"
          - "Coface"
          - "parecer de crédito"
          - "inadimplência"
          - "risco comercial"
          - "exposição"
          - "score"
          - "rating"
        
        tags:
