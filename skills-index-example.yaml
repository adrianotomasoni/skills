        priority: "critical"
        
        description: |
          Criar e revisar interfaces production-grade para produtos TradeRisk.
          Stack: React 18 + TypeScript + Tailwind + shadcn/ui
          Aplica brand system e design patterns específicos.
        
        triggers:
          - "cria um componente"
          - "monta esse layout"
          - "faz um design pra"
          - "React component"
          - "revisa o UI"
          - "interface"
          - "página"
          - "form"
          - "dashboard"
        
        tags:
          - "ui"
          - "react"
          - "design"
          - "frontend"
