        name: "Auditoria SEO TradeRisk"
        category: "marketing/seo"
        path: "traderisk/seo-auditoria"
        priority: "medium"
        
        description: |
          Auditoria de SEO em tempo real para traderisk.com.br e domínios relacionados.
          Análise de ranking, snippets, gaps vs competidores.
        
        triggers:
          - "analisar SEO"
          - "como estamos no Google"
          - "ranking caiu"
          - "perdendo posições"
          - "SEO"
          - "posicionamento"
          - "keywords"
          - "snippet"
          - "indexado"
          - "posição"
          - "velocidade"
          - "mobile"
        
        tags:
