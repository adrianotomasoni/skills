          - "marketing"
          - "analytics"
          - "growth"
        
        models: ["claude-haiku-4", "claude-sonnet-4"]
        minTokens: 1000
        
        targetDomains:
          - "traderisk.com.br"
          - "licitacaoprotegida.com.br"
          - "onetowerseguros.com.br"
          - "leiloeiroprotegido.com.br"
        
        targetPages:
          - "/garantia-judicial"
          - "/seguro-garantia"
          - "/seguro-credito"
          - "/seguro-credito-exportacao"
          - "/deposito-recursal-trabalhista"
          - "/garantia-leiloeiro"
        
        competitors:
          - "pottencial.com.br"
          - "sombrero.com.br"
          - "ezze.com.br"
          - "junto.com.br"
        
        outputFormats:
          - "Markdown report com tabelas"
          - "JSON de posições"
          - "Recomendações priorizadas"
      
      
