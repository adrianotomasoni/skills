name: Validate Skills & Agents

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
    paths:
      - "skills/**"
      - "agents/**"
      - "scripts/**"
      - "registry.json"
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "agents/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate canonical multiplatform format
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate all skills (frontmatter + skill.json)
        run: python scripts/validate-skills.py --strict

      - name: Validate all agents
        run: python scripts/validate-agents.py

      - name: Run structural tests
        run: python scripts/test-skills.py

      - name: Export adapters (dry-run sanity check)
        run: python scripts/export-adapters.py --dry-run

      - name: Check registry.json is up to date
        run: python scripts/generate-registry.py --check
