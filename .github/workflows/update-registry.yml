name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "agents/**"

jobs:
  update-registry:
    runs-on: ubuntu-latest
    name: Auto-update registry.json

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate registry.json
        run: python scripts/generate-registry.py --summary

      - name: Commit updated registry
        run: |
          git config user.name "Skills Registry Bot"
          git config user.email "bot@traderisk.com.br"
          git add registry.json
          git diff --staged --quiet || git commit -m "chore: Auto-update registry.json [skip ci]"
          git push
